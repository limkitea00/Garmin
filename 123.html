<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #fff; color: #111; }

    .feature-section { margin-bottom: 8px; }

    .section-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 16px;
    }

    .bullet {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #888;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      margin-bottom: 2px;
    }

    .section-desc {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
      padding: 0 16px 10px 33px;
    }

    .divider {
      height: 0.5px;
      background: #e5e5e5;
      margin: 0 16px;
    }
  </style>
</head>
<body>

  <div class="feature-section">
    <div class="section-header">
      <div class="bullet"></div>
      <div>
        <div class="section-title">고도 및 경사도 데이터</div>
      </div>
    </div>
    <div class="section-desc">실시간 고도 변화와 경사도 정보 제공</div>
    <div class="divider"></div>
  </div>

  <div class="feature-section">
    <div class="section-header">
      <div class="bullet"></div>
      <div>
        <div class="section-title">내비게이션 기능</div>
      </div>
    </div>
    <div class="section-desc">브레이크포인트 트래킹과 랩스타트 기능</div>
  </div>

</body>
</html>
